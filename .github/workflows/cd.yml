name: CD - Promoción y Despliegue de Modelo

on:
  workflow_dispatch:

jobs:
  deploy-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Validate FastAPI import
        run: |
          python -c "from app.main import app; print('API OK')"

      - name: Simulated promotion
        run: |
          echo "✅ Modelo validado y promovido a producción"