name: CI - Train + API Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pwd
          ls -R
          find . -name "requirements.txt"
          pip install -r ./requirements.txt
      - name: Train model
        run: |
          mkdir -p ruta/mlruns
          python app/train.py

      - name: Validate model (MLflow version)
        run: |
          python app/validate.py

      - name: Test FastAPI import
        run: |
          python -c "from app.main import app; print('API OK')"

      - name: Upload MLruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: ruta/mlruns